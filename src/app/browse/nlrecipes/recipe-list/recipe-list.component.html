<div class="container">
  <div class="search-container">
    <mat-form-field appearance="outline">
      <mat-label>Szukaj</mat-label>
      <input
        matInput
        (keyup)="applyFilter($event)"
        placeholder="Szukaj w tabeli"
      />
    </mat-form-field>
  </div>

  <mat-table [dataSource]="dataSource" class="flex-table">
    <!-- Nazwa -->
    <ng-container matColumnDef="nazwa" class="flex-cell-large">
      <th mat-header-cell *matHeaderCellDef class="flex-cell-large">Nazwa przepisu</th>
      <td mat-cell *matCellDef="let row">
        {{ row.nazwaPrzepisu }}
      </td>
    </ng-container>

    <!-- Kategoria -->
    <ng-container matColumnDef="kategoria" class="flex-cell-large">
      <th mat-header-cell *matHeaderCellDef class="flex-cell-large">Kategoria przepisu</th>
      <td mat-cell *matCellDef="let row">
        {{ row.kategoria?.nazwa }}
      </td>
    </ng-container>

    <!-- Kcal -->
    <ng-container matColumnDef="kcal" class="flex-cell-small">
      <th mat-header-cell *matHeaderCellDef>Kcal</th>
      <td mat-cell *matCellDef="let row">
        {{ row.gda?.kcal }}
      </td>
    </ng-container>

    <!-- Białko -->
    <ng-container matColumnDef="bialko" class="flex-cell-small">
      <th mat-header-cell *matHeaderCellDef class="flex-cell-small">Białko</th>
      <td mat-cell *matCellDef="let row">
        {{ row.gda?.bialka }}
      </td>
    </ng-container>

    <!-- Tłuszcze -->
    <ng-container matColumnDef="tluszcze" class="flex-cell-small">
      <th mat-header-cell *matHeaderCellDef class="flex-cell-small">Tłuszcze</th>
      <td mat-cell *matCellDef="let row">
        {{ row.gda?.tluszcze }}
      </td>
    </ng-container>

    <!-- Węglowodany -->
    <ng-container matColumnDef="weglowodany" class="flex-cell-large">
      <th mat-header-cell *matHeaderCellDef class="flex-cell-large">Węglowodany</th>
      <td mat-cell *matCellDef="let row">
        {{ row.gda?.weglowodany }}
      </td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions" class="flex-cell-large">
      <th mat-header-cell *matHeaderCellDef class="flex-cell-large"></th>
      <td mat-cell *matCellDef="let row">
        <button
          mat-icon-button
          color="primary"
          [routerLink]="['../view', row.id]"
        >
          <mat-icon>search</mat-icon>
        </button>
      </td>
    </ng-container>

    <!-- Header -->
    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns"
      class="tablehead"
    ></tr>

    <!-- Rows -->
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </mat-table>

  <mat-paginator
    [length]="przepisy.length"
    [pageSize]="10"
    [pageSizeOptions]="[5, 10, 15, 20, 50, 100]"
  ></mat-paginator>
</div>
